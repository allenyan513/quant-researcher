name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        # v8 introduced "immutable releases and secure tags" — there is no
        # moving `v8` tag, so pin to a specific `v8.x.y`. Bump explicitly
        # when a new minor lands and we want it.
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync deps
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest
